name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build module
        run: |
          docker build -t po32-builder -f scripts/Dockerfile .
          docker run --rm -v "$PWD:/build" -u "$(id -u):$(id -g)" -w /build po32-builder ./scripts/build.sh

      - name: Update release.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/po32-drum-module.tar.gz"
          echo "{\"version\":\"${VERSION}\",\"download_url\":\"${DOWNLOAD_URL}\"}" > release.json

      - name: Commit release.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release.json
          git diff --staged --quiet || git commit -m "release: update release.json for ${GITHUB_REF_NAME}"
          git push origin HEAD:main

      - uses: softprops/action-gh-release@v1
        with:
          files: dist/po32-drum-module.tar.gz
